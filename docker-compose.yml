services:
  frontend:
    build: .
    container_name: easy-english-frontend
    restart: unless-stopped
    ports:
      - "3080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: easy-english-backend
    restart: unless-stopped
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/easy_english
      - FRONTEND_URL=${FRONTEND_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: easy-english-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=easy_english
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: easy-english-allure
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - CHECK_RESULTS_EVERY_SECONDS=3
      - KEEP_HISTORY=20
    volumes:
      - allure_results:/app/allure-results
      - allure_reports:/app/default-reports

  allure-ui:
    image: frankescobar/allure-docker-service-ui:latest
    container_name: easy-english-allure-ui
    restart: unless-stopped
    ports:
      - "5252:5252"
    environment:
      - ALLURE_DOCKER_PUBLIC_API_URL=http://192.168.77.9:5050
      - ALLURE_DOCKER_PUBLIC_API_URL_PREFIX=
    depends_on:
      - allure

volumes:
  postgres_data:
  allure_results:
  allure_reports:
